name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: install go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'
        check-latest: true
        cache: true

    - name: lint
      run: |
        make lint

    - name: test
      run: |
        make test
